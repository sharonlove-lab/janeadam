function hackerTypeWriter(htmlContent, targetArea) {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = htmlContent;
    const warnings = tempDiv.querySelectorAll('.warning');
    const typeSound = document.getElementById('typeSound');
    const alarmSound = document.getElementById('alarmSound');
    const container = document.querySelector('.container');

    if (warnings.length > 0) {
        // 有警告 → 执行解密动画
        container.classList.add('alarm-active');
        document.body.style.backgroundColor = "#4a0000";
        if (alarmSound) alarmSound.play().catch(() => {});

        let textToType = '';
        warnings.forEach(w => {
            const cleanedText = w.innerText.split('\n').map(line => line.trim()).filter(line => line).join('\n');
            textToType += cleanedText + '\n\n';
        });

        targetArea.innerHTML = `
            <div class="decrypt-container">
                <div class="decrypt-bar" id="decryptBar"></div>
                <div class="decrypt-status" id="decryptStatus">DECRYPTING: 0%</div>
            </div>
            <div class="warning" style="white-space: pre-wrap;" id="hacker-text"></div>
        `;

        const textBox = document.getElementById('hacker-text');
        const bar = document.getElementById('decryptBar');
        const status = document.getElementById('decryptStatus');

        let i = 0;
        function typeNextChar() {
            if (i < textToType.length) {
                if (typeSound) {
                    typeSound.currentTime = 0;
                    typeSound.play().catch(() => {});
                }

                let progress = Math.round(((i + 1) / textToType.length) * 100);
                bar.style.width = progress + '%';
                if (i % 3 === 0) {
                    const chars = "!@#$%^&*()_+";
                    const randomChar = chars[Math.floor(Math.random() * chars.length)];
                    status.innerText = `DECRYPTING: ${progress}% [${randomChar}]`;
                } else {
                    status.innerText = `DECRYPTING: ${progress}%`;
                }

                textBox.innerHTML = textToType.substring(0, i + 1) + '<span class="cursor"></span>';
                i++;
                setTimeout(typeNextChar, 25);
            } else {
                status.innerText = "ACCESS GRANTED - DECRYPTION COMPLETE";
                status.style.color = "#00ff00";

                setTimeout(() => {
                    container.classList.remove('alarm-active');
                    document.body.style.backgroundColor = "#0a0a0a";
                    if (alarmSound) {
                        alarmSound.pause();
                        alarmSound.currentTime = 0;
                    }
                    targetArea.innerHTML = htmlContent;
                    
                    document.getElementById('global-comments').style.display = 'block'; 
                    
                }, 1000);
            }
        }

        typeNextChar();

    } else {
        targetArea.innerHTML = htmlContent;
    }
}
